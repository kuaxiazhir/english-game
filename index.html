<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语单词大闯关 - 三年级</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  /* ========== 主页 ========== */
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 28px 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 150px;
    height: 150px;
    background: rgba(102, 126, 234, 0.08);
    border-radius: 50%;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 120px;
    height: 120px;
    background: rgba(118, 75, 162, 0.08);
    border-radius: 50%;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-size: 14px;
    font-weight: 700;
    color: #667eea;
    background: rgba(102, 126, 234, 0.1);
    padding: 6px 14px;
    border-radius: 20px;
  }

  .stats {
    display: flex;
    gap: 16px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: #333;
  }

  .stat-label {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
  }

  .word-area {
    margin: 20px 0 28px;
    position: relative;
    z-index: 1;
  }

  .word-display {
    font-size: 52px;
    font-weight: 800;
    color: #333;
    letter-spacing: 2px;
    margin-bottom: 12px;
    transition: all 0.3s;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  }

  .word-display.correct-pulse {
    animation: correctPulse 0.6s ease;
  }

  .word-display.wrong-shake {
    animation: wrongShake 0.5s ease;
  }

  @keyframes correctPulse {
    0% { transform: scale(1); color: #333; }
    50% { transform: scale(1.2); color: #27ae60; }
    100% { transform: scale(1); color: #333; }
  }

  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .word-meaning {
    font-size: 18px;
    color: #888;
    letter-spacing: 1px;
  }

  .word-hint {
    display: none;
    font-size: 13px;
    color: #e74c3c;
    margin-top: 12px;
    padding: 8px 16px;
    background: rgba(231, 76, 60, 0.08);
    border-radius: 12px;
    animation: fadeIn 0.3s;
  }

  .word-hint.show { display: inline-block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-bar-wrap {
    width: 100%;
    height: 8px;
    background: #e8e8e8;
    border-radius: 4px;
    margin-bottom: 24px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .btn {
    display: inline-block;
    border: none;
    outline: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 16px;
    border-radius: 16px;
    padding: 14px 28px;
    transition: all 0.25s;
    position: relative;
    z-index: 1;
    font-family: inherit;
  }

  .btn:active { transform: scale(0.95); }

  .btn-mic {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 18px;
    padding: 16px 40px;
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 auto;
  }

  .btn-mic.listening {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
    animation: micPulse 1s infinite;
  }

  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
    50% { box-shadow: 0 0 0 16px rgba(231, 76, 60, 0); }
  }

  .mic-icon {
    font-size: 24px;
  }

  .btn-skip {
    background: #f5f5f5;
    color: #888;
    margin-top: 12px;
    padding: 10px 24px;
    font-size: 14px;
  }

  .btn-restart {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 14px 36px;
    font-size: 16px;
    box-shadow: 0 4px 14px rgba(102, 126, 234, 0.3);
  }

  .btn-flex {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .feedback-area {
    margin-top: 16px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .feedback-text {
    font-size: 15px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 12px;
    animation: fadeIn 0.3s;
  }

  .feedback-text.correct {
    background: rgba(39, 174, 96, 0.1);
    color: #27ae60;
  }

  .feedback-text.wrong {
    background: rgba(231, 76, 60, 0.1);
    color: #e74c3c;
  }

  .feedback-text.info {
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
  }

  /* ========== 结果页 ========== */
  .result-page { display: none; }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 12px;
  }

  .result-title {
    font-size: 24px;
    font-weight: 800;
    color: #333;
    margin-bottom: 8px;
  }

  .result-subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 24px;
  }

  .result-score {
    font-size: 56px;
    font-weight: 900;
    color: #667eea;
  }

  .result-detail {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 20px 0;
    font-size: 14px;
    color: #666;
  }

  .result-detail span { font-weight: 700; color: #333; }

  .stars {
    font-size: 32px;
    margin: 8px 0 20px;
    letter-spacing: 6px;
  }

  /* ========== 模式提示 ========== */
  .mode-note {
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    position: relative;
    z-index: 1;
  }

  /* ========== 不支持的提示 ========== */
  .unsupported-notice {
    display: none;
    background: #fff3cd;
    color: #856404;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    text-align: center;
  }

  /* ========== 回合计数 ========== */
  .round-info {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }

  /* ========== 倒计时 ========== */
  .timer-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .timer-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 4px solid #667eea;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: #667eea;
    transition: all 0.3s;
  }

  .timer-circle.urgent {
    border-color: #e74c3c;
    color: #e74c3c;
    animation: timerPulse 0.5s infinite;
  }

  @keyframes timerPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* ========== 反馈图片弹窗 ========== */
  .feedback-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.2s;
  }

  .feedback-overlay.show {
    display: flex;
  }

  .feedback-img {
    max-width: 80%;
    max-height: 70%;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    animation: popIn 0.35s ease;
  }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ========== 答题页背景 ========== */
  .card.game-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(2px);
  }

  body.game-active {
    background: url('图片5.jpg') center/cover no-repeat fixed;
  }

  /* ========== 开始界面 & 倒计时 ========== */
  .start-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    position: relative;
    z-index: 1;
  }

  .start-title {
    font-size: 28px;
    font-weight: 900;
    color: #667eea;
    margin-bottom: 8px;
  }

  .start-sub {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 32px;
  }

  .btn-start {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 22px;
    padding: 18px 56px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 800;
    font-family: inherit;
    box-shadow: 0 8px 28px rgba(102, 126, 234, 0.4);
    transition: all 0.25s;
  }

  .btn-start:active { transform: scale(0.95); }

  .countdown-display {
    font-size: 80px;
    font-weight: 900;
    color: #667eea;
    animation: countPop 0.9s ease;
  }

  @keyframes countPop {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ========== 隐藏 ========== */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <!-- 开始界面 -->
  <div class="card" id="startScreen">
    <div class="start-overlay" id="startContent">
      <div class="start-title">英语单词大闯关</div>
      <div class="start-sub">三年级 Pep 人教版</div>
      <button class="btn-start" onclick="startCountdown()">开始</button>
    </div>
    <div class="start-overlay hidden" id="countdownScreen">
      <div class="countdown-display" id="countdownNum">3</div>
    </div>
  </div>

  <!-- 游戏主页 -->
  <div class="card game-card hidden" id="gamePage">
    <div class="header">
      <div class="logo">三年级英语</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">得分</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="streak">0</div>
          <div class="stat-label">连对</div>
        </div>
      </div>
    </div>

    <div class="round-info">第 <span id="roundNum">1</span> / <span id="totalWords">10</span> 词</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width: 0%"></div>
    </div>

    <div class="timer-wrap">
      <div class="timer-circle" id="timerCircle">10</div>
    </div>

    <div class="word-area">
      <div class="word-display" id="currentWord">hello</div>
      <div class="word-meaning" id="wordMeaning">你好</div>
      <div class="word-hint" id="wordHint"></div>
    </div>

    <div class="unsupported-notice" id="unsupportedNotice">
      当前浏览器不支持语音识别，已切换为手动模式：读出单词后点"我读对了"
    </div>

    <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">
      <span class="mic-icon">🎤</span> 开始朗读
    </button>

    <div class="btn-flex" style="margin-top: 12px;">
      <button class="btn btn-skip" onclick="skipWord()">跳过 ›</button>
    </div>

    <div class="feedback-area" id="feedbackArea"></div>
    <div class="mode-note" id="modeNote">说出单词发音，系统自动评分</div>
  </div>

  <!-- 结果页 -->
  <div class="card result-page" id="resultPage">
    <div class="result-score" id="resultScore">0</div>
    <div style="font-size:14px;color:#888;">总得分</div>
    <div class="result-detail">
      <div>正确 <span id="resultCorrect">0</span></div>
      <div>答错/超时 <span id="resultSkipped">0</span></div>
      <div>最佳连对 <span id="resultBestStreak">0</span></div>
    </div>
    <div class="result-subtitle" id="resultMsg"></div>
    <button class="btn btn-restart" onclick="restartGame()">再来一次</button>
  </div>

  <!-- 反馈图片弹窗 -->
  <div class="feedback-overlay" id="feedbackOverlay" onclick="dismissFeedback()">
    <img class="feedback-img" id="feedbackImg" src="" alt="">
  </div>

  <!-- 反馈音效 -->
  <audio id="correctAudio" preload="auto" src="correct.mp3"></audio>
  <audio id="wrongAudio" preload="auto" src="wrong.mp3"></audio>
  <audio id="result3Audio" preload="auto" src="提示音3.mp3"></audio>
  <audio id="result4Audio" preload="auto" src="提示音4.mp3"></audio>
</div>

// ==================== 游戏状态 ====================
const WORDS_PER_ROUND = 10;
const TIMER_SECONDS = 10;
let words = [];
let currentIndex = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let correctCount = 0;
let wrongCount = 0;
let isListening = false;
let recognition = null;
let speechSupported = false;
let manualMode = false;
let timerInterval = null;
let timeLeft = TIMER_SECONDS;

// ==================== 初始化 ====================
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    speechSupported = false;
    enableManualMode();
    return;
  }

  speechSupported = true;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  recognition.onresult = function(event) {
    const results = event.results[0];
    const alternatives = [];
    for (let i = 0; i < results.length; i++) {
      alternatives.push(results[i].transcript.trim().toLowerCase());
    }
    checkAnswer(alternatives);
  };

  recognition.onerror = function(event) {
    isListening = false;
    updateMicButton();
    if (event.error === 'not-allowed') {
      showFeedback('请允许麦克风权限后再试 🙏', 'info');
    } else if (event.error === 'no-speech') {
      showFeedback('没有听到声音，请再试一次 🔊', 'info');
    } else {
      showFeedback('识别出错，请重试', 'info');
    }
  };

  recognition.onend = function() {
    isListening = false;
    updateMicButton();
  };
}

function enableManualMode() {
  manualMode = true;
  document.getElementById('unsupportedNotice').style.display = 'block';
  document.getElementById('modeNote').textContent = '手动模式：读出单词后点"我读对了"';
}

// ==================== 游戏流程 ====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  words = shuffle(WORD_BANK).slice(0, WORDS_PER_ROUND);
  currentIndex = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;
  correctCount = 0;
  wrongCount = 0;
  isListening = false;
  clearTimer();
  
  updateScore();
  updateStreak();
  showWord();
  updateProgress();
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gamePage').classList.remove('hidden');
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('feedbackArea').innerHTML = '';
  document.getElementById('wordHint').classList.remove('show');
  document.body.classList.add('game-active');
}

function showWord() {
  if (currentIndex >= words.length) {
    showResult();
    return;
  }
  clearTimer();
  const word = words[currentIndex];
  document.getElementById('currentWord').textContent = word.w;
  document.getElementById('currentWord').classList.remove('correct-pulse', 'wrong-shake');
  document.getElementById('wordMeaning').textContent = word.c;
  document.getElementById('wordHint').classList.remove('show');
  document.getElementById('feedbackArea').innerHTML = '';
  document.getElementById('roundNum').textContent = currentIndex + 1;
  document.getElementById('totalWords').textContent = WORDS_PER_ROUND;
  updateProgress();
  startTimer();
}

// ==================== 计时器 ====================
function startTimer() {
  timeLeft = TIMER_SECONDS;
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearTimer();
      onTimeout();
    }
  }, 1000);
}

function clearTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  timeLeft = TIMER_SECONDS;
  var circle = document.getElementById('timerCircle');
  circle.classList.remove('urgent');
  circle.textContent = TIMER_SECONDS;
}

function updateTimerDisplay() {
  var circle = document.getElementById('timerCircle');
  circle.textContent = timeLeft;
  if (timeLeft <= 3) {
    circle.classList.add('urgent');
  } else {
    circle.classList.remove('urgent');
  }
}

function onTimeout() {
  // 超时 = 答错
  if (isListening) {
    recognition.stop();
    isListening = false;
    updateMicButton();
  }
  showFeedbackImg('wrong');
  showFeedback('⏰ 时间到！', 'wrong');
  document.getElementById('wordHint').textContent = '正确读音: ' + words[currentIndex].w;
  document.getElementById('wordHint').classList.add('show');
  streak = 0;
  wrongCount++;
  updateStreak();
  setTimeout(nextWord, 1800);
}

function updateProgress() {
  const pct = (currentIndex / WORDS_PER_ROUND) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function toggleMic() {
  if (manualMode) {
    // 手动模式：当作读对了
    handleManualCorrect();
    return;
  }

  if (!speechSupported) {
    enableManualMode();
    handleManualCorrect();
    return;
  }

  if (isListening) {
    recognition.stop();
    isListening = false;
    updateMicButton();
  } else {
    try {
      recognition.start();
      isListening = true;
      updateMicButton();
      showFeedback('正在听你说… 🎧', 'info');
    } catch (e) {
      isListening = false;
      updateMicButton();
      showFeedback('启动失败，请重试', 'info');
    }
  }
}

function updateMicButton() {
  const btn = document.getElementById('micBtn');
  if (manualMode) {
    btn.innerHTML = '<span class="mic-icon">✅</span> 我读对了';
    btn.className = 'btn btn-mic';
    btn.style.background = 'linear-gradient(135deg, #27ae60, #2ecc71)';
    btn.style.boxShadow = '0 6px 20px rgba(39, 174, 96, 0.4)';
    return;
  }
  if (isListening) {
    btn.innerHTML = '<span class="mic-icon">🔴</span> 正在听…';
    btn.className = 'btn btn-mic listening';
  } else {
    btn.innerHTML = '<span class="mic-icon">🎤</span> 开始朗读';
    btn.className = 'btn btn-mic';
  }
}

function handleManualCorrect() {
  clearTimer();
  showFeedbackImg('correct');
  document.getElementById('currentWord').classList.add('correct-pulse');
  markCorrect();
}

function checkAnswer(alternatives) {
  clearTimer();
  const target = words[currentIndex].w.toLowerCase();
  const wordDisplay = document.getElementById('currentWord');
  
  // 检查是否匹配（支持相近发音的模糊匹配）
  let matched = false;
  for (const alt of alternatives) {
    if (alt === target || alt.replace(/\s+/g, '') === target) {
      matched = true;
      break;
    }
  }

  if (matched) {
    showFeedbackImg('correct');
    wordDisplay.classList.add('correct-pulse');
    markCorrect();
  } else {
    showFeedbackImg('wrong');
    const heard = alternatives[0] || '（未识别）';
    showFeedback('❌ 再试试！听到的是: ' + heard, 'wrong');
    wordDisplay.classList.add('wrong-shake');
    document.getElementById('wordHint').textContent = '正确读音: ' + target;
    document.getElementById('wordHint').classList.add('show');
    streak = 0;
    wrongCount++;
    updateStreak();
  }
}

// ==================== 反馈图片 & 音效 ====================
function showFeedbackImg(type) {
  const overlay = document.getElementById('feedbackOverlay');
  const img = document.getElementById('feedbackImg');
  const correctAudio = document.getElementById('correctAudio');
  const wrongAudio = document.getElementById('wrongAudio');

  if (type === 'correct') {
    img.src = 'correct.jpg';
    correctAudio.currentTime = 0;
    correctAudio.play().catch(function() {});
  } else {
    img.src = 'wrong.jpg';
    wrongAudio.currentTime = 0;
    wrongAudio.play().catch(function() {});
  }

  overlay.classList.add('show');
  
  // 1.5秒后自动关闭
  setTimeout(function() {
    overlay.classList.remove('show');
  }, 1500);
}

function dismissFeedback() {
  document.getElementById('feedbackOverlay').classList.remove('show');
}

function markCorrect() {
  score += 10;
  streak += 1;
  correctCount += 1;
  if (streak > bestStreak) bestStreak = streak;
  
  updateScore();
  updateStreak();
  
  setTimeout(nextWord, 800);
}

function skipWord() {
  // 跳过按钮：等同于答错
  clearTimer();
  if (isListening) {
    recognition.stop();
    isListening = false;
    updateMicButton();
  }
  wrongCount++;
  streak = 0;
  updateStreak();
  showFeedbackImg('wrong');
  document.getElementById('wordHint').textContent = '正确读音: ' + words[currentIndex].w;
  document.getElementById('wordHint').classList.add('show');
  setTimeout(nextWord, 1800);
}

function nextWord() {
  currentIndex++;
  showWord();
}

function showFeedback(msg, type) {
  const area = document.getElementById('feedbackArea');
  area.innerHTML = '<span class="feedback-text ' + type + '">' + msg + '</span>';
}

function updateScore() {
  document.getElementById('score').textContent = score;
}

function updateStreak() {
  document.getElementById('streak').textContent = streak;
}

// ==================== 结果页 ====================
function showResult() {
  clearTimer();
  document.body.classList.remove('game-active');
  document.getElementById('gamePage').classList.add('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultCorrect').textContent = correctCount;
  document.getElementById('resultSkipped').textContent = wrongCount;
  document.getElementById('resultBestStreak').textContent = bestStreak;
  
  // 总分判定：>=50 显示图片3+提示音3，<50 显示图片4+提示音4
  setTimeout(function() {
    var overlay = document.getElementById('feedbackOverlay');
    var img = document.getElementById('feedbackImg');
    var audio3 = document.getElementById('result3Audio');
    var audio4 = document.getElementById('result4Audio');
    
    if (score >= 50) {
      img.src = '图片3.jpg';
      audio3.currentTime = 0;
      audio3.play().catch(function() {});
      document.getElementById('resultMsg').textContent = '恭喜你，表现很棒！';
    } else {
      img.src = '图片4.jpg';
      audio4.currentTime = 0;
      audio4.play().catch(function() {});
      document.getElementById('resultMsg').textContent = '继续加油，你可以更好！';
    }
    overlay.classList.add('show');
    
    // 5秒后自动关闭
    setTimeout(function() {
      overlay.classList.remove('show');
    }, 5000);
  }, 600);
}

function restartGame() {
  // 显示结果页倒计时，3秒后开始下一局
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('startContent').classList.add('hidden');
  document.getElementById('countdownScreen').classList.remove('hidden');
  document.getElementById('feedbackOverlay').classList.remove('show');
  
  var count = 3;
  var cd = document.getElementById('countdownNum');
  cd.textContent = count;
  cd.style.animation = 'none';
  void cd.offsetWidth;
  cd.style.animation = 'countPop 0.9s ease';
  
  var interval = setInterval(function() {
    count--;
    if (count <= 0) {
      clearInterval(interval);
      cd.textContent = 'GO!';
      cd.style.color = '#27ae60';
      setTimeout(function() {
        cd.style.color = '#667eea';
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('countdownScreen').classList.add('hidden');
        document.getElementById('startContent').classList.remove('hidden');
        startGame();
      }, 400);
    } else {
      cd.textContent = count;
      cd.style.animation = 'none';
      void cd.offsetWidth;
      cd.style.animation = 'countPop 0.9s ease';
    }
  }, 1000);
}

// ==================== 开始倒计时 ====================
function startCountdown() {
  document.getElementById('startContent').classList.add('hidden');
  document.getElementById('countdownScreen').classList.remove('hidden');
  
  var count = 3;
  var cd = document.getElementById('countdownNum');
  cd.textContent = count;
  cd.style.animation = 'none';
  void cd.offsetWidth;
  cd.style.animation = 'countPop 0.9s ease';
  
  var interval = setInterval(function() {
    count--;
    if (count <= 0) {
      clearInterval(interval);
      cd.textContent = 'GO!';
      cd.style.color = '#27ae60';
      setTimeout(function() {
        cd.style.color = '#667eea';
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('countdownScreen').classList.add('hidden');
        document.getElementById('startContent').classList.remove('hidden');
        startGame();
      }, 400);
    } else {
      cd.textContent = count;
      cd.style.animation = 'none';
      void cd.offsetWidth;
      cd.style.animation = 'countPop 0.9s ease';
    }
  }, 1000);
}

// ==================== 启动 ====================
initRecognition();
// 显示开始界面，不自动开始
document.getElementById('startScreen').classList.remove('hidden');
document.getElementById('gamePage').classList.add('hidden');
document.getElementById('resultPage').classList.add('hidden');
</script>
